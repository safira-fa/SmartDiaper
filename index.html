<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Diaper Monitor</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
    .label { font-size: 18px; font-weight: bold; }
    .status { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 14px; text-align: center; }
    .status.off { background: #27ae60; }  /* зелёный для "НЕТ" — чтобы было видно */
    .status.on { background: #e74c3c; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    .temp-value { font-size: 20px; font-weight: bold; color: #2c3e50; min-width: 70px; text-align: center; }
    .temp-value.normal { color: #27ae60; }
    .temp-value.warning { color: #f39c12; }
    .temp-value.critical { color: #e74c3c; }
    .last-update { text-align: center; color: #666; font-size: 14px; margin-top: 20px; line-height: 1.8; }
    .error { color: #e74c3c; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>👶 Умный подгузник</h1>
  
  <div class="card">
    <span class="label">🔻 Упал</span>
    <div id="accel" class="status off">НЕТ</div>
  </div>
  <div class="card">
    <span class="label">🔊 Кричит</span>
    <div id="micro" class="status off">НЕТ</div>
  </div>
  <div class="card">
    <span class="label">💧 Мокрый подгузник</span>
    <div id="water" class="status off">НЕТ</div>
  </div>
  <div class="card">
    <span class="label">🌡️ Температура</span>
    <div id="temp" class="temp-value">—</div>
  </div>
  
  <div id="error" class="error"></div>
  <div class="last-update">
    <div>Получено: <span id="timestamp">—</span></div>
    <div>Данные обновлены: <span id="last-post">—</span></div>
  </div>

  <script>
    const WORKER_URL = 'https://smart-diaper-gateway.safira-fa.workers.dev/status';
    
    function updateUI(data) {
      // Бинарные индикаторы: упал / кричит / мокрый
      ['accel', 'micro', 'water'].forEach(id => {
        const el = document.getElementById(id);
        const val = data[id] ?? 0;
        el.className = `status ${val ? 'on' : 'off'}`;
        el.textContent = val ? 'ДА' : 'НЕТ';
      });
      
      // Температура с цветовой индикацией
      const tempEl = document.getElementById('temp');
      const temp = data.temp;
      if (temp == null || isNaN(temp)) {
        tempEl.textContent = '—';
        tempEl.className = 'temp-value';
      } else {
        const t = parseFloat(temp).toFixed(1);
        tempEl.textContent = `${t}°`;
        tempEl.className = `temp-value ${t < 35 || t > 38 ? 'critical' : t < 36 || t > 37.5 ? 'warning' : 'normal'}`;
      }
      
      // Время получения данных (локальное)
      document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();
      
      // Время последнего обновления данных на сервере (из POST)
      const lastPost = data.lastUpdate || null;
      document.getElementById('last-post').textContent = lastPost 
        ? new Date(lastPost).toLocaleString() 
        : '—';
      
      document.getElementById('error').textContent = '';
    }
    
    async function fetchStatus() {
      try {
        const res = await fetch(WORKER_URL, {
          method: 'GET',
          headers: { 'Accept': 'application/json' },
          cache: 'no-store'
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        updateUI(data);
      } catch (err) {
        console.error('Fetch error:', err);
        document.getElementById('error').textContent = '⚠️ Нет связи с сервером';
      }
    }
    
    // Опрос каждые 5 секунд
    setInterval(fetchStatus, 5000);
    fetchStatus();
  </script>
</body>
</html>
